services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sproutkit}
      POSTGRES_USER: ${POSTGRES_USER:-sproutkit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sproutkit}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
